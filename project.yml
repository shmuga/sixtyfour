name: SixtyFour
options:
  bundleIdPrefix: com.sixtyfour
  deploymentTarget:
    iOS: "17.0"

settings:
  DEVELOPMENT_TEAM: RS3489446Y
  CODE_SIGN_STYLE: Automatic

targets:
  SixtyFour:
    type: application
    platform: iOS
    sources:
      - SixtyFour
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.markorel.sixtyfour
      SWIFT_VERSION: "5.9"
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: 9
      CODE_SIGN_ENTITLEMENTS: SixtyFour/SixtyFour.entitlements
      GENERATE_INFOPLIST_FILE: "YES"
      INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
      INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - target: SixtyFourWidgetExtension

  SixtyFourWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - SixtyFourWidgetExtension
      - path: SixtyFour/Services
      - path: SixtyFour/Models
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.markorel.sixtyfour.widget
      SWIFT_VERSION: "5.9"
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: 9
      CODE_SIGN_ENTITLEMENTS: SixtyFourWidgetExtension/SixtyFourWidgetExtension.entitlements
      INFOPLIST_FILE: SixtyFourWidgetExtension/Info.plist

schemes:
  SixtyFour:
    build:
      targets:
        SixtyFour: all
        SixtyFourWidgetExtension: all
    run:
      config: Debug
